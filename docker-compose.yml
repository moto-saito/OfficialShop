version: '3.8'

services:
  app:
    build:
      context: ./docker
      dockerfile: php/Dockerfile
    container_name: official-shop-app
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - official-shop-network

  db:
    image: mysql:8.0
    container_name: official-shop-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: official_shop
      MYSQL_USER: laravel
      MYSQL_PASSWORD: password
    volumes:
      - ./mysql:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - official-shop-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: official-shop-phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - official-shop-network

networks:
  official-shop-network:
    driver: bridge
